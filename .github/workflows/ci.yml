name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint code
        run: npm run lint
      
      - name: Build extension
        run: npm run compile
      
      - name: Run unit tests
        run: npm run test:unit

      - name: Detect integration-relevant changes
        id: change-filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            integration:
              - 'src/**'
              - 'package.json'
              - 'tsconfig.json'
              - 'esbuild.js'

      - name: Run integration tests
        if: steps.change-filter.outputs.integration == 'true'
        run: xvfb-run -a npm run test:integration

      - name: Skip integration tests
        if: steps.change-filter.outputs.integration != 'true'
        run: echo "No integration-relevant code changes detected; skipping integration tests."
      
      - name: Package extension
        if: github.ref == 'refs/heads/main'
        run: npx @vscode/vsce package
      
      - name: Upload VSIX artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: busdriver-vsix
          path: '*.vsix'
          retention-days: 30
