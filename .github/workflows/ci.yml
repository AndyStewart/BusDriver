name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint code
        run: npm run lint
      
      - name: Build extension
        run: npm run compile
      
      - name: Run unit tests
        run: npm run test:unit

      - name: Generate unit coverage report (non-gating)
        run: npm run test:unit:coverage

      - name: Publish coverage summary
        if: always()
        run: |
          if [ -f coverage/unit/coverage-summary.json ]; then
            node -e 'const fs=require("fs");const summary=JSON.parse(fs.readFileSync("coverage/unit/coverage-summary.json","utf8")).total;const lines=["## Unit Coverage (Non-Gating)","","| Metric | % | Covered / Total |","|---|---:|---:|",`| Lines | ${summary.lines.pct}% | ${summary.lines.covered} / ${summary.lines.total} |`,`| Statements | ${summary.statements.pct}% | ${summary.statements.covered} / ${summary.statements.total} |`,`| Functions | ${summary.functions.pct}% | ${summary.functions.covered} / ${summary.functions.total} |`,`| Branches | ${summary.branches.pct}% | ${summary.branches.covered} / ${summary.branches.total} |`];fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,`${lines.join("\n")}\n`);'
          else
            echo "Coverage summary file not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload unit coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/unit
          retention-days: 14

      - name: Detect integration-relevant changes
        id: change-filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            integration:
              - 'src/**'
              - 'package.json'
              - 'tsconfig.json'
              - 'esbuild.js'

      - name: Run integration tests
        if: steps.change-filter.outputs.integration == 'true'
        run: xvfb-run -a npm run test:integration

      - name: Skip integration tests
        if: steps.change-filter.outputs.integration != 'true'
        run: echo "No integration-relevant code changes detected; skipping integration tests."
      
      - name: Package extension
        if: github.ref == 'refs/heads/main'
        run: npx @vscode/vsce package
      
      - name: Upload VSIX artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: busdriver-vsix
          path: '*.vsix'
          retention-days: 30
